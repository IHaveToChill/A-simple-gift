<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Interface // Proposal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">

        <div id="screenProposal" class="screen active">
            
            <div class="cyber-cat-display">
                <div class="scanline-overlay"></div>
                <img src="tenor.gif" alt="Cute Cat" class="cat-gif-asset">
            </div>

            <h1 id="question" class="main-question">Do you love me?</h1>
            
            <div class="btn-row">
                <button id="yesBtn" class="btn btn-yes" onclick="selectYes()">Execute // YES</button>
                <button id="noBtn" class="btn btn-no" onclick="handleNoClick()">Bypass // NO</button>
            </div>
        </div>

        <div id="screenSuccess" class="screen">
            <div class="cyber-cat-display success-border">
                <div class="scanline-overlay"></div>
                <img src="tenor1.gif" alt="Happy Cat" class="cat-gif-asset">
            </div>
            <h1 class="main-question success-text">Access Granted // I knew you'd say yes 💕</h1>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
